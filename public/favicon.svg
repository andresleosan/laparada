<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      .icon-circle { stroke: #D4AF37; stroke-width: 3; fill: none; }
      .icon-line { stroke: #D4AF37; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .icon-fill { fill: #D4AF37; }
    </style>
  </defs>
  
  <!-- Fondo oscuro -->
  <rect width="200" height="200" fill="#1A1A1A"/>
  
  <!-- Círculo exterior -->
  <circle cx="100" cy="100" r="90" class="icon-circle"/>
  
  <!-- Vapor arriba -->
  <path d="M 85 35 Q 85 30 90 30" class="icon-line" />
  <path d="M 100 35 Q 100 30 105 30" class="icon-line" />
  <path d="M 115 35 Q 115 30 120 30" class="icon-line" />
  
  <!-- Techo del carrito -->
  <rect x="70" y="45" width="60" height="12" rx="1" class="icon-fill"/>
  
  <!-- Estructura del carrito - posts verticales -->
  <line x1="75" y1="57" x2="75" y2="80" class="icon-line" />
  <line x1="125" y1="57" x2="125" y2="80" class="icon-line" />
  
  <!-- Estantería - líneas horizontales -->
  <line x1="70" y1="62" x2="130" y2="62" class="icon-line" />
  <line x1="70" y1="72" x2="130" y2="72" class="icon-line" />
  
  <!-- Botella en estantería -->
  <rect x="90" y="64" width="3" height="7" class="icon-fill" />
  <circle cx="91.5" cy="63" r="2" class="icon-fill" />
  
  <!-- Base del carrito -->
  <line x1="70" y1="82" x2="130" y2="82" class="icon-line" />
  
  <!-- Ruedas -->
  <circle cx="80" cy="95" r="10" class="icon-line"/>
  <circle cx="120" cy="95" r="10" class="icon-line"/>
  
  <!-- Detalles de las ruedas -->
  <circle cx="80" cy="95" r="5" class="icon-line" />
  <circle cx="120" cy="95" r="5" class="icon-line" />
  
  <!-- Manija del carrito -->
  <path d="M 65 80 L 60 65" class="icon-line" />
</svg>
